<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./src/index.js"></script>
</head>
<body>
    <section class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <input class="new-todo" placeholder="What needs to be done?" autofocus>
        </header>
        <section class="main">
            <ul class="todo-list">
                <!-- Сюда JavaScript будет добавлять новые задачи -->
            </ul>
        </section>
        <footer class="footer">
            <span class="todo-count"><strong>0</strong>  Задач</span>
        </footer>
    </section>
</body>
